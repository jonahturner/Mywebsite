<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hole-in-One Snake | Jonah Turner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a3a32; color: white; font-family: 'Segoe UI', sans-serif; }
        canvas { 
            border: 8px solid #ffffff22; 
            background-color: #2d5a27; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: block; margin: 20px auto; 
        }
        .btn-golf { background-color: #ffffff; color: #1a3a32; font-weight: bold; border-radius: 30px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">Jonah Turner</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link" href="resume.html">Résumé</a>
            <a class="nav-link active" href="WebApp.html">Game</a>
        </div>
    </div>
</nav>

<div class="container text-center my-5">
    <h1 class="display-4 fw-bold">⛳ Hole-in-One Snake</h1>
    <div class="d-flex justify-content-center gap-3 my-4">
        <div class="p-3 bg-dark rounded">Score: <span id="score">0</span></div>
        <div class="p-3 bg-dark rounded">Best: <span id="highScore">0</span></div>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <button class="btn btn-golf btn-lg px-5" onclick="resetGame()">New Round</button>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const box = 20; 
    let snake, food, d, score, highScore = 0, gameLoop;

    function resetGame() {
        snake = [{ x: 9 * box, y: 10 * box }];
        food = { x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box };
        d = null; score = 0; document.getElementById("score").innerHTML = score;
        if (gameLoop) clearInterval(gameLoop);
        gameLoop = setInterval(draw, 120);
    }

    document.addEventListener("keydown", e => {
        if(e.keyCode==37 && d!="RIGHT") d="LEFT";
        if(e.keyCode==38 && d!="DOWN") d="UP";
        if(e.keyCode==39 && d!="LEFT") d="RIGHT";
        if(e.keyCode==40 && d!="UP") d="DOWN";
    });

    function draw() {
        ctx.fillStyle = "#2d5a27"; ctx.fillRect(0, 0, 400, 400);
        for(let i=0; i<snake.length; i++) {
            ctx.fillStyle = (i==0) ? "#FFF" : "#EEE";
            ctx.beginPath(); ctx.arc(snake[i].x+10, snake[i].y+10, 8, 0, Math.PI*2); ctx.fill();
        }
        ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(food.x+10, food.y+10, 6, 0, Math.PI*2); ctx.fill();
        
        let snakeX = snake[0].x, snakeY = snake[0].y;
        if(d=="LEFT") snakeX-=box; if(d=="UP") snakeY-=box;
        if(d=="RIGHT") snakeX+=box; if(d=="DOWN") snakeY+=box;

        if(snakeX==food.x && snakeY==food.y) {
            score++; document.getElementById("score").innerHTML = score;
            food = { x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box };
        } else { snake.pop(); }

        let newHead = {x:snakeX, y:snakeY};
        if(snakeX<0 || snakeX>=400 || snakeY<0 || snakeY>=400 || snake.some(s => s.x==newHead.x && s.y==newHead.y)) {
            clearInterval(gameLoop); if(score>highScore) { highScore=score; document.getElementById("highScore").innerHTML=highScore; }
            alert("Game Over!");
        }
        snake.unshift(newHead);
    }
    resetGame();
</script>
</body>
</html>
